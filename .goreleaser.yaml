version: 2

project_name: unsni

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/unsni
    binary: unsni
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - docs/*

checksum:
  name_template: checksums.txt

release:
  draft: false
